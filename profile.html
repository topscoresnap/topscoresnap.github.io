<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TopScoreSnap — الملف الشخصي</title>
<meta name="description" content="الملف الموثّق للاعب على TopScoreSnap — النقاط، الترتيب، وشهادة الإنجاز.">
<meta name="robots" content="noindex">
<link rel="icon" href="logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-glow" aria-hidden="true"></div>

<header class="site-header">
  <div class="wrap header-inner">
    <a href="index.html" class="brand">
      <img src="logo.png" alt="TopScoreSnap" class="brand-mark">
      <span class="brand-name">TopScoreSnap</span>
    </a>
    <nav class="main-nav" aria-label="Main">
      <a href="index.html" data-i18n="nav.home">الرئيسية</a>
    </nav>
    <button id="langToggle" class="lang-toggle" type="button" aria-label="Switch language">
      <span class="lang-toggle-dot" aria-hidden="true"></span>
      <span id="langToggleLabel">EN</span>
    </button>
  </div>
</header>

<main>
  <section class="profile-section">
    <div class="wrap profile-wrap" id="profileWrap">
      <div class="cert-loading">
        <div class="cert-loading-ring"></div>
        <p class="cert-loading-text" data-i18n="profile.loading">جارٍ التحميل...</p>
      </div>
    </div>
  </section>
</main>

<footer class="site-footer">
  <div class="wrap footer-inner">
    <div class="footer-brand">
      <img src="logo.png" alt="" class="brand-mark small">
      <span class="brand-name">TopScoreSnap</span>
    </div>
    <p class="footer-tagline" data-i18n="footer.tagline">تتبع أعلى نقاط سناب شات، ببساطة.</p>
    <p class="footer-rights">© <span id="year"></span> TopScoreSnap · <span data-i18n="footer.rights">جميع الحقوق محفوظة</span></p>
  </div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="certificate.js"></script>
<script>
(() => {
  "use strict";

  const PSTR = {
    ar: {
      "nav.home": "الرئيسية",
      "footer.tagline": "تتبع أعلى نقاط سناب شات، ببساطة.",
      "footer.rights": "جميع الحقوق محفوظة",
      "profile.loading": "جارٍ التحميل...",
      "profile.eyebrow": "ملف لاعب موثّق",
      "profile.subtitle": "من أعلى حسابات Snap Score عالميًا",
      "profile.fullScoreLabel": "Snap Score الكامل",
      "profile.publicScoreNote": "المعروض على لوحة الصدارة العامة",
      "profile.rank": "الترتيب العالمي",
      "profile.percentile": "من أفضل",
      "profile.percentileLabel": "النسبة المئوية",
      "profile.id": "رقم الشهادة",
      "profile.verified": "تاريخ التوثيق",
      "profile.showImage": "إظهار صورة الشهادة",
      "profile.hideImage": "إخفاء الصورة",
      "profile.share": "مشاركة",
      "profile.download": "تحميل الصورة",
      "profile.notFoundTitle": "لم يتم العثور على هذا الحساب",
      "profile.notFoundDesc": "تأكد من الرابط، أو ارجع للوحة المتصدرين وابحث عن اليوزر من هناك.",
      "profile.invalidTitle": "رابط غير صالح",
      "profile.invalidDesc": "افتح هذه الصفحة من رابط أو زر داخل الموقع.",
      "profile.backHome": "الرجوع للوحة المتصدرين",
      "club.billion": "نادي المليار",
      "club.elite": "نادي 250 مليون+",
      "club.verified": "نادي 100 مليون+",
      "toggleLabel": "EN"
    },
    en: {
      "nav.home": "Home",
      "footer.tagline": "Tracking the highest Snapchat scores, made simple.",
      "footer.rights": "All rights reserved",
      "profile.loading": "Loading...",
      "profile.eyebrow": "Verified Player Profile",
      "profile.subtitle": "Top-Ranked Global Snap Score Account",
      "profile.fullScoreLabel": "Full Snap Score",
      "profile.publicScoreNote": "Shown on the public leaderboard as",
      "profile.rank": "Global Rank",
      "profile.percentile": "Top",
      "profile.percentileLabel": "Percentile",
      "profile.id": "Certificate ID",
      "profile.verified": "Verified On",
      "profile.showImage": "Show Certificate Image",
      "profile.hideImage": "Hide Image",
      "profile.share": "Share",
      "profile.download": "Download Image",
      "profile.notFoundTitle": "Account Not Found",
      "profile.notFoundDesc": "Check the link, or go back to the leaderboard and search for the username there.",
      "profile.invalidTitle": "Invalid Link",
      "profile.invalidDesc": "Please open this page from a link or button inside the site.",
      "profile.backHome": "Back to Leaderboard",
      "club.billion": "Billion Club",
      "club.elite": "250M+ Club",
      "club.verified": "100M+ Club",
      "toggleLabel": "عربي"
    }
  };

  const LANG_KEY = "tss_lang";
  let lang = localStorage.getItem(LANG_KEY) || "ar";
  let cd = null;
  let cardEl = null;

  function t(key) { return PSTR[lang][key] || key; }

  function applyStaticLanguage() {
    document.documentElement.lang = lang;
    document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";
    document.querySelectorAll("[data-i18n]").forEach(el => {
      const key = el.getAttribute("data-i18n");
      if (PSTR[lang][key]) el.textContent = PSTR[lang][key];
    });
    document.getElementById("langToggleLabel").textContent = PSTR[lang].toggleLabel;
    window.TSS_LANG = lang;
  }

  function formatDate(d) {
    const monthsAr = ["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
    const monthsEn = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const names = lang === "ar" ? monthsAr : monthsEn;
    return `${d.getDate()} ${names[d.getMonth()]} ${d.getFullYear()}`;
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  function renderMessage(title, desc) {
    document.getElementById("profileWrap").innerHTML = `
      <div class="verify-status verify-status-neutral">
        <h1 class="verify-title">${title}</h1>
        <p class="verify-desc">${desc}</p>
        <a href="index.html" class="btn btn-ghost facet verify-home-btn" style="margin-top:20px;display:inline-block;width:auto;">${t("profile.backHome")}</a>
      </div>`;
  }

  function renderProfile(account, fullScore) {
    const hasFull = fullScore && String(fullScore).trim().length > 0;
    const club = window.TSSCertificate.clubOf(account.score);
    document.getElementById("profileWrap").innerHTML = `
      <div class="profile-hero">
        <div class="cert-verified-pill profile-pill"><span>✓</span></div>
        <p class="eyebrow" data-i18n="profile.eyebrow">${t("profile.eyebrow")}</p>
        <div class="cert-seal tier-${cd.tier} profile-seal"><span>#${cd.rank}</span></div>
        <h1 class="profile-username">${escapeHtml(account.username)}</h1>
        <p class="profile-subtitle">${t("profile.subtitle")}</p>
        <div class="club-badge club-${club}">
          <svg viewBox="0 0 24 24" width="13" height="13" aria-hidden="true"><path fill="currentColor" d="M6 3h12v2h2a1 1 0 0 1 1 1c0 3-2 5-4.5 5.4A5.5 5.5 0 0 1 13 15.9V18h3v2H8v-2h3v-2.1A5.5 5.5 0 0 1 7.5 11.4C5 11 3 9 3 6a1 1 0 0 1 1-1h2V3Zm0 4H5c.3 1.4 1.3 2.4 2.6 2.8A6 6 0 0 1 6 7Zm12 0a6 6 0 0 1-1.6 2.8C17.7 9.4 18.7 8.4 19 7h-1Z"/></svg>
          <span>${t("club." + club)}</span>
        </div>

        <div class="profile-score-block">
          <span class="cert-score-value profile-score-value">${escapeHtml(hasFull ? fullScore : account.score)}</span>
          <span class="cert-score-label">${t("profile.fullScoreLabel")}</span>
          ${hasFull ? `<span class="profile-public-note">${t("profile.publicScoreNote")}: ${escapeHtml(account.score)}</span>` : ""}
        </div>
      </div>

      <div class="verify-detail facet">
        <div class="verify-detail-row"><span>${t("profile.rank")}</span><b>#${cd.rank}</b></div>
        <div class="verify-detail-row"><span>${t("profile.percentileLabel")}</span><b>${t("profile.percentile")} ${cd.topPercent}%</b></div>
        <div class="verify-detail-row"><span>${t("profile.id")}</span><b>${cd.certId}</b></div>
        <div class="verify-detail-row"><span>${t("profile.verified")}</span><b>${formatDate(cd.date)}</b></div>
      </div>

      <div class="profile-actions">
        <button type="button" class="btn btn-ghost facet" id="showImgBtn">${t("profile.showImage")}</button>
        <button type="button" class="btn btn-ghost facet" id="shareBtn">${t("profile.share")}</button>
        <button type="button" class="btn btn-primary facet" id="downloadBtn">${t("profile.download")}</button>
      </div>

      <div class="profile-card-container" id="cardContainer"></div>
    `;

    const showBtn = document.getElementById("showImgBtn");
    const shareBtn = document.getElementById("shareBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const container = document.getElementById("cardContainer");

    function ensureCard() {
      if (!cardEl) cardEl = window.TSSCertificate.mount(container, cd, lang);
      return cardEl;
    }

    function setBusy(btn, busy) {
      btn.disabled = busy;
      if (busy) { btn.dataset.label = btn.textContent; btn.textContent = "..."; }
      else if (btn.dataset.label) { btn.textContent = btn.dataset.label; }
    }

    showBtn.addEventListener("click", () => {
      ensureCard();
      const expanded = container.classList.toggle("expanded");
      showBtn.textContent = expanded ? t("profile.hideImage") : t("profile.showImage");
    });

    downloadBtn.addEventListener("click", async () => {
      const el = ensureCard();
      setBusy(downloadBtn, true);
      await window.TSSCertificate.downloadFromCard(cd, el, () => setBusy(downloadBtn, false));
    });

    shareBtn.addEventListener("click", async () => {
      const el = ensureCard();
      setBusy(shareBtn, true);
      await window.TSSCertificate.shareFromCard(cd, el, () => setBusy(shareBtn, false));
    });
  }

  async function load() {
    const params = new URLSearchParams(location.search);
    const username = params.get("u");
    if (!username) {
      renderMessage(t("profile.invalidTitle"), t("profile.invalidDesc"));
      return;
    }

    let data, fullData;
    try {
      const [r1, r2] = await Promise.all([
        fetch("data.json", { cache: "no-store" }),
        fetch("scores-full.json", { cache: "no-store" }).catch(() => null)
      ]);
      data = await r1.json();
      fullData = r2 ? await r2.json().catch(() => ({ fullScores: {} })) : { fullScores: {} };
    } catch (err) {
      renderMessage(t("profile.notFoundTitle"), t("profile.notFoundDesc"));
      return;
    }

    const account = (data.accounts || []).find(a => a.username.toLowerCase() === username.toLowerCase());
    if (!account) {
      renderMessage(t("profile.notFoundTitle"), t("profile.notFoundDesc"));
      return;
    }

    cd = window.TSSCertificate.buildCertData(username, data);
    cardEl = null;
    const fullScore = (fullData.fullScores || {})[account.username];
    renderProfile(account, fullScore);
  }

  document.getElementById("year").textContent = new Date().getFullYear();
  applyStaticLanguage();
  load();

  document.getElementById("langToggle").addEventListener("click", () => {
    lang = lang === "ar" ? "en" : "ar";
    localStorage.setItem(LANG_KEY, lang);
    applyStaticLanguage();
    if (cd) load();
  });
})();
</script>
</body>
</html>
