<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TopScoreSnap — الأسئلة الشائعة</title>
<meta name="description" content="أسئلة شائعة حول TopScoreSnap: كيف تُبنى القائمة، كيف تنضم لها، ونظام النقاط.">
<link rel="icon" href="logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-glow" aria-hidden="true"></div>

<header class="site-header">
  <div class="wrap header-inner">
    <a href="index.html" class="brand">
      <img src="logo.png" alt="TopScoreSnap" class="brand-mark">
      <span class="brand-name">TopScoreSnap</span>
    </a>
    <nav class="main-nav" aria-label="Main">
      <a href="index.html" data-i18n="nav.home">الرئيسية</a>
      <a href="compare.html" data-i18n="nav.compare">قارن</a>
    </nav>
    <button id="langToggle" class="lang-toggle" type="button" aria-label="Switch language">
      <span class="lang-toggle-dot" aria-hidden="true"></span>
      <span id="langToggleLabel">EN</span>
    </button>
  </div>
</header>

<main>
  <section class="faq-section">
    <div class="wrap faq-wrap">
      <p class="eyebrow faq-eyebrow" data-i18n="faq.eyebrow">مركز المساعدة</p>
      <h1 class="faq-title" data-i18n="faq.title">الأسئلة الشائعة</h1>

      <div class="faq-list" id="faqList"></div>

      <div class="contact-inner facet faq-contact">
        <p class="contact-text" data-i18n="faq.stillHelp">ما لقيت جوابك؟ تواصل معنا مباشرة.</p>
        <a href="https://www.tiktok.com/@topscoresnap?_r=1&_t=ZS-97qScSjjjfB" target="_blank" rel="noopener" class="btn btn-primary facet">
          <span data-i18n="contact.tiktok">تابعنا على TikTok</span>
        </a>
      </div>
    </div>
  </section>
</main>

<footer class="site-footer">
  <div class="wrap footer-inner">
    <div class="footer-brand">
      <img src="logo.png" alt="" class="brand-mark small">
      <span class="brand-name">TopScoreSnap</span>
    </div>
    <p class="footer-tagline" data-i18n="footer.tagline">تتبع أعلى نقاط سناب شات، ببساطة.</p>
    <p class="footer-rights">© <span id="year"></span> TopScoreSnap · <span data-i18n="footer.rights">جميع الحقوق محفوظة</span></p>
  </div>
</footer>

<script>
(() => {
  "use strict";

  const FSTR = {
    ar: {
      "nav.home": "الرئيسية",
      "nav.compare": "قارن",
      "footer.tagline": "تتبع أعلى نقاط سناب شات، ببساطة.",
      "footer.rights": "جميع الحقوق محفوظة",
      "contact.tiktok": "تابعنا على TikTok",
      "faq.eyebrow": "مركز المساعدة",
      "faq.title": "الأسئلة الشائعة",
      "faq.stillHelp": "ما لقيت جوابك؟ تواصل معنا مباشرة.",
      "toggleLabel": "EN"
    },
    en: {
      "nav.home": "Home",
      "nav.compare": "Compare",
      "footer.tagline": "Tracking the highest Snapchat scores, made simple.",
      "footer.rights": "All rights reserved",
      "contact.tiktok": "Follow us on TikTok",
      "faq.eyebrow": "Help Center",
      "faq.title": "Frequently Asked Questions",
      "faq.stillHelp": "Couldn't find your answer? Reach out directly.",
      "toggleLabel": "عربي"
    }
  };

  const FAQ = {
    ar: [
      { q: "وش هو Snap Score؟", a: "هو الرقم اللي يحسبه سناب شات لكل مستخدم بناءً على نشاطه بالتطبيق — أبرز ما يرفعه إرسال السنابات، فتحها، ونشر الستوري بانتظام. كل ما زاد استخدامك اليومي، زادت نقطتك تراكميًا." },
      { q: "كيف تُبنى قائمة TopScoreSnap؟", a: "نجمع الحسابات المعروفة اللي تجاوزت نقاطها 100 مليون نقطة من مصادر عامة، ونرتبها من الأعلى للأقل. القائمة تُحدَّث يدويًا بشكل دوري." },
      { q: "ليش ما ألقى حساب كان موجود قبل؟", a: "القائمة تعرض الحسابات الفعّالة فقط وقت آخر تحديث. إذا انحظر حساب أو توقف، ننزّله من القائمة — وهذا موضّح في قسم «عن الموقع»." },
      { q: "كيف أثبت رقم نقاطي؟", a: "أرسل لنا سكرينشوت واضح لصفحة ملفك الشخصي بسناب شات يبيّن اليوزر والنقاط، عن طريق التيك توك بالأسفل." },
      { q: "كيف أنضم للقائمة؟", a: "إذا نقاطك حوالي 100 مليون أو أكثر (أو تعرف شخص كذا)، تواصل معنا عبر حساب TikTok في الأسفل مع سكرينشوت إثبات، ونراجع الطلبات ونحدّث القائمة بشكل دوري." },
      { q: "هل TopScoreSnap تابع رسميًا لسناب شات؟", a: "لا. هذا موقع مستقل وغير رسمي، وما له أي ارتباط أو تأييد من شركة Snap Inc. أو تطبيق Snapchat." },
      { q: "وش الفرق بين السكور اللي بالجدول والسكور اللي بصفحة البروفايل؟", a: "الجدول يعرض رقم مختصر (مثل 1.1B) عشان يكون سريع القراءة. صفحة البروفايل تعرض الرقم الكامل والدقيق إذا كان متوفر لدينا. صورة الشهادة القابلة للمشاركة تستخدم دائمًا الرقم المختصر نفسه اللي بالجدول." },
      { q: "كيف أحصل على شهادة إنجاز لحسابي؟", a: "ادخل على ملفك من الجدول أو من أعلى 3 بالصفحة الرئيسية، وبتلقى صفحة فيها بياناتك كاملة وأزرار لعرض/مشاركة/تحميل صورة الشهادة." }
    ],
    en: [
      { q: "What is Snap Score?", a: "It's the number Snapchat calculates for every user based on in-app activity — mainly sending snaps, opening them, and posting to your Story regularly. The more consistently you use the app, the more it builds up over time." },
      { q: "How is the TopScoreSnap list built?", a: "We gather known accounts that have crossed 100 million points from publicly available sources and rank them highest to lowest. The list is updated by hand on a regular basis." },
      { q: "Why can't I find an account that used to be listed?", a: "The list only shows accounts that were active as of the last update. If an account gets banned or suspended, we remove it — this is explained in the About section." },
      { q: "How do I prove my score?", a: "Send us a clear screenshot of your Snapchat profile showing your username and score, via the TikTok link below." },
      { q: "How do I get added to the list?", a: "If your score is around 100 million or more (or you know someone who qualifies), reach out via the TikTok account below with a proof screenshot. We review requests and update the list periodically." },
      { q: "Is TopScoreSnap officially affiliated with Snapchat?", a: "No. This is an independent, unofficial site with no affiliation with or endorsement from Snap Inc. or Snapchat." },
      { q: "What's the difference between the leaderboard score and the profile page score?", a: "The leaderboard shows an abbreviated number (like 1.1B) for quick scanning. The profile page shows the exact, full number when we have it. The shareable certificate image always uses the same abbreviated number as the leaderboard." },
      { q: "How do I get an achievement certificate for my account?", a: "Open your profile from the table or the top-3 section on the homepage — you'll land on a page with your full details and buttons to view, share, or download your certificate image." }
    ]
  };

  const LANG_KEY = "tss_lang";
  let lang = localStorage.getItem(LANG_KEY) || "ar";

  function t(key) { return FSTR[lang][key] || key; }

  function renderFaq() {
    const list = document.getElementById("faqList");
    list.innerHTML = FAQ[lang].map((item, i) => `
      <details class="faq-item facet" ${i === 0 ? "open" : ""}>
        <summary class="faq-q">${item.q}</summary>
        <p class="faq-a">${item.a}</p>
      </details>
    `).join("");
  }

  function applyStaticLanguage() {
    document.documentElement.lang = lang;
    document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";
    document.querySelectorAll("[data-i18n]").forEach(el => {
      const key = el.getAttribute("data-i18n");
      if (FSTR[lang][key]) el.textContent = FSTR[lang][key];
    });
    document.getElementById("langToggleLabel").textContent = FSTR[lang].toggleLabel;
    renderFaq();
  }

  document.getElementById("year").textContent = new Date().getFullYear();
  applyStaticLanguage();

  document.getElementById("langToggle").addEventListener("click", () => {
    lang = lang === "ar" ? "en" : "ar";
    localStorage.setItem(LANG_KEY, lang);
    applyStaticLanguage();
  });
})();
</script>
</body>
</html>
